<script>
function get_local_time(data) {
  // 1. Clean the time string (remove periods and uppercase)
  const cleanTime = data.time.replace(/\./g, '').toUpperCase();

  // 2. Build the UTC offset string (e.g., -4 becomes "-04:00")
  const absOffset = Math.abs(data.utc).toString().padStart(2, '0');
  const sign = data.utc >= 0 ? '+' : '-';
  const offsetString = `GMT${sign}${absOffset}:00`;

  // 3. Create the native Date object in local system time
  const localDate = new Date(`${data.date} ${cleanTime} ${offsetString}`);

  // 4. Helper function for ordinal suffixes (1st, 2nd, 3rd, 4th...)
  const getDaySuffix = (day) => {
    if (day >= 11 && day <= 13) return 'th';
    switch (day % 10) {
      case 1:  return 'st';
      case 2:  return 'nd';
      case 3:  return 'rd';
      default: return 'th';
    }
  };

  // 5. Extract date components
  const weekday = localDate.toLocaleDateString('en-US', { weekday: 'short' });
  const month = localDate.toLocaleDateString('en-US', { month: 'long' });
  const dayNum = localDate.getDate();
  const dayWithSuffix = `${dayNum}${getDaySuffix(dayNum)}`;

  // 6. Extract and format 12-hour time components
  let hours = localDate.getHours();
  const minutes = localDate.getMinutes().toString().padStart(2, '0');
  const ampm = hours >= 12 ? 'pm' : 'am';
  hours = hours % 12 || 12;

  // 7. Return the final formatted text string
  return `${weekday} ${month} ${dayWithSuffix}, ${hours}:${minutes}${ampm}`;
}
