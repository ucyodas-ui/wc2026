<style>


img{  box-shadow: 2px 2px 4px #555;}

  height:15px;
  padding=2px;

}

  font-size:12px;
  margin-left:180px;

  table { border-collapse: collapse; margin: 10px; min-width:770px;}
  tbody tr:nth-child(odd)  { background-color: #f2f2f2; }
  tbody tr:nth-child(even) { background-color: #ffffff; }
  thead tr {  background-color: #4CAF50;  color: white; font-size:15px; }
  td { padding:5px; color:black; min-width:20px;}
  th { vertical-align:bottom;  background-color:#222; color:#eee; padding:2px; border:1px solid white; position:sticky; top: 95px;} 
  h2 { background-color: #121; padding:5px; position:sticky; top: 66px; line-height:20px; z-index:100;}
}

  content: "\2714"; /* Heavy Check Mark */
  color: green;
  font-size: 14px;
}

  content: "\2718"; /* Heavy Ballot X */
  color: red;
  font-size: 14px;
}

<script>

function place(yes){ return yes ? "<span style='color:blue;' >&#10003;</span>" : ""; }
function qual( yes){ return yes ? "<span style='color:green;'>&#10004;</span>" : ""; }
function bonus(yes){ return yes ? "<span style='color:gold;' >&#9733;</span>"  : ""; }
function tick(yes) { return yes ? "<span class='tick'></span>" : "<span class='cross'></span>" }

  let RESULTS = new knockout_results()

  window.addEventListener('load', function() {
    console.log("LOAD")
    load_country_data(COUNTRY)
    COUNTRY.setup_keys()
    DRAW.add_country(COUNTRY)
    setup_entries()
    add_groups(COUNTRY)
    add_rankings(COUNTRY)
    add_flags(COUNTRY)

    const gs = new group_stage(COUNTRY)
    
    
//    let combined_gs_table = combine_tables(gs)
    
    RESULTS.add_country(COUNTRY)
    RESULTS.add_third_place_ranking_table(THIRD_PLACE_RANKING_VS)
    add_matches(DRAW)
    RESULTS.add_draw(DRAW)
   
    add_scores(RESULTS)

    gs.grp_ids.forEach(group_id => {
      let ranked = gs.get_ranked_teams(group_id)
      RESULTS.add_group_results(group_id, ranked, true)
    })

    var third_ranks = gs.get_third_place_ranks()
    RESULTS.add_third_place_teams(third_ranks)


    DRAW.setup_bracket()
    
    knockouts = DRAW.get_bracket()


    const stats = new match_stats(COUNTRY, RESULTS, gs)

    const ep = new entry_points(entries, gs, RESULTS, stats)

    const pts = ep.get_entry_points()
    
    
//    let stages_completed = RESULTS.get_stages_completed()
//    console.log("stages_completed", stages_completed)

    display_R32_points( RESULTS, knockouts, pts)
    display_R16_points( RESULTS, knockouts, pts)
    display_QF_points(  RESULTS, knockouts, pts)
    display_SF_points(  RESULTS, knockouts, pts)
    display_F34_points( RESULTS, knockouts, pts)
    display_F_points(   RESULTS, knockouts, pts)


    COUNTRY.update_class_flags()
  })

  function both_points(stage,entry)
  {
    let pts = 0;
    entry.ko[stage].forEach(r => pts+=r.both);
    return pts
  }
  function winner_points(stage,entry)
  {
    let pts = 0;
    entry.ko[stage].forEach(r => pts+=r.winner);
    return pts
  }
  function loser_points(stage,entry)
  {
    let pts = 0;
    entry.ko[stage].forEach(r => pts+=r.loser);
    return pts
  }

  
  function display_points(stage, RESULTS, knockout, pts, show_losers)
  {
    if (!RESULTS.is_stage_completed(stage)) return "Stage not completed";
    let html = []
    console.log(stage, "Results", RESULTS)
    console.log(stage, "pts", pts)
    console.log(stage, "knockout", knockout)
    
    html.push("<table>")
    let matches = []
    let winners = []
    let losers = []
    knockout[stage].forEach((match_no) => {
      let m = RESULTS.get_knockout_result(match_no)
      let game = m.team1+" x "+m.team2
      matches.push(game)
      let w = m.winner
      let l = m.loser
      winners.push(w)
      losers.push(l)
//      console.log("match",match_no, m)
    })
    html.push("<tr><th>")
    html.push("<th colspan="+(matches.length+1)+">Matches")
    html.push("<th colspan="+(winners.length+1)+">Winners")
    if (show_losers)
      html.push("<th colspan="+(losers.length+1)+">Losers")
    html.push("<th>")
    html.push("<tr><th>Entry Name")
    matches.forEach(m => {
      html.push("<th>"+m)
    })
    html.push("<th>Pts")

    winners.forEach(t => {
      html.push("<th><span class='flag_"+t+"'>"+t+"</span>")
    })
    html.push("<th>Pts")
    if (show_losers)
    {
      losers.forEach(t => {
        html.push("<th><span class='flag_"+t+"'>"+t+"</span>")
      })
      html.push("<th>Pts")
    }
    html.push("<th>Total")

    
  
    pts.forEach((entry,index) => {
      console.log(entry)
      html.push("<tr><td>#"+(index+1)+" "+entry.entry.name+full_name_span(entry.entry.name))
      
      matches.forEach(m => {
        html.push("<td>"+tick(entry.games_picked[stage].includes(m)))
      })
      let b_pts = both_points(stage,entry)
      html.push("<td>"+b_pts)

      winners.forEach(t => {
        html.push("<td>"+tick(entry.winners_picked[stage].includes(t)))
      })
      let w_pts = winner_points(stage,entry)
      html.push("<td>"+w_pts)

      if (show_losers)
      {
        losers.forEach(t => {
          html.push("<td>"+tick(entry.losers_picked[stage].includes(t)))
        })
        let l_pts = loser_points(stage,entry)
        html.push("<td>"+l_pts)
      }


      html.push("<td>"+(b_pts+w_pts))
    })
    
//    RESULTS.ko_data.forEach()
//    blah()
    
    
    
    return html.join("")
  }
  
  function display_R32_points(RESULTS, knockout, pts)
  {
    document.getElementById("stage_R32").innerHTML = display_points("R32", RESULTS, knockout, pts)
  }

  function display_R16_points(RESULTS, knockout, pts)
  {
    document.getElementById("stage_R16").innerHTML = display_points("R16", RESULTS, knockout, pts)
  }
  
  function display_QF_points(RESULTS, knockout, pts)
  {
    document.getElementById("stage_QF").innerHTML = display_points("QF", RESULTS, knockout, pts)
  }

  function display_SF_points(RESULTS, knockout, pts)
  {
    document.getElementById("stage_SF").innerHTML = display_points("SF", RESULTS, knockout, pts)
  }

  function display_F34_points(RESULTS, knockout, pts)
  {
    document.getElementById("stage_F34").innerHTML = display_points("F34", RESULTS, knockout, pts, true)
  }

  function display_F_points(RESULTS, knockout, pts)
  {
    document.getElementById("stage_F").innerHTML = display_points("F", RESULTS, knockout, pts, true)
  }
  
  function combine_tables(gs)
  {
    let combined = []
    gs.grp_ids.forEach(group_id => {
      let ranked = gs.get_ranked_teams(group_id)
      ranked.forEach(team => {
        combined.push(team);
      })
    })
    
    console.log("combined",combined)
    
    return combined
  }

  function pad(n) { return String(n).padStart(3, '0'); }

  function sort_and_rank(combined_table, sorter)
  {
    combined_table.forEach(entry => { sorter(entry)})
    combined_table.sort((b,a) => a.sort_value.localeCompare(b.sort_value))
    combined_table.forEach((entry, index) => {
      if ((index == 0) || entry.sort_value != combined_table[index-1].sort_value)
      {
        entry.sorted_pos = index+1
        entry.sorted_tied = false;
      }
      else
      {
        entry.sorted_tied = true;
        entry.sorted_pos = combined_table[index-1].sorted_pos
        combined_table[index-1].sorted_tied = true
      }
    })
    
  }

  function display_all(gs,combined_table)
  {
    // Sort by pts, then GD, then GF, cards
    const sorter = (entry) => { entry.sort_value = pad(entry.pts) + pad(entry.gd+500) + pad(entry.gf) + pad(1000+entry.cards.pts); }
    sort_and_rank(combined_table, sorter);
    
    var html = []
    html.push("<table><tr><th rowspan=2>Pos<th rowspan=2>Qual<br>Grp<th rowspan=2>Still<br>Alive<th rowspan=2 colspan=3>Team<th rowspan=2>Pld<th rowspan=2>W<th rowspan=2>D<th rowspan=2>L<th rowspan=2>GF<th rowspan=2>GA<th rowspan=2>GD<th rowspan=2>Pts<th colspan=5>Fair_Play<th rowspan=2>World<br>Rank")
    html.push("<tr><th>Y<th>YY&gt;R<th>R<th>YR<th>pts")
    
    
    combined_table.forEach(team => {
      let qs = gs.get_qualified_status(team.abr)
      let q = tick(qs.qualified)+(qs.confirmed?"":"**")

      html.push("<tr>")
      html.push("<td>#"+team.sorted_pos+((team.sorted_tied)?"**":""))
      html.push("<td>"+q)
      html.push("<td>"+tick(team.alive)+team.stage)
      html.push("<td class='flag_"+team.abr+"'>")
      html.push("<td>"+team.full)
      html.push("<td>("+team.abr+")")
      html.push("<td>"+team.pld)
      html.push("<td>"+team.w)
      html.push("<td>"+team.d)
      html.push("<td>"+team.l)
      html.push("<td>"+team.gf)
      html.push("<td>"+team.ga)
      html.push("<td>"+team.gd)
      html.push("<td>"+team.pts)
      html.push("<td>"+team.cards.y)
      html.push("<td>"+team.cards.yy)
      html.push("<td>"+team.cards.r)
      html.push("<td>"+team.cards.yr)
      html.push("<td>"+team.cards.pts)
      html.push("<td>"+team.rank)
//      html.push("<td>"+team.sort_value)
    })
    html.push("</table>")
    document.getElementById("stats_table").innerHTML = html.join("")
    
  }
  
  function div(v,gms)
  {
    if (gms==0) return "0.0"
    var p = (v/gms)
    return p.toFixed(1)
    
  }


  
  
</script>
