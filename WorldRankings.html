<style>

body {
  /* Modern & Accessible */
  font-family: "Inter", Roboto, "Helvetica Neue", Arial, sans-serif;
  line-height: 1.6; /* Important for document readability */
  color: #333; /* Slightly softer than pure black */
}

#country_list_test {
  img{  box-shadow: 2px 2px 4px #555;}
  table { border-collapse: collapse; margin: 10px; }
  tbody tr:nth-child(odd)  { background-color: #f2f2f2; }
  tbody tr:nth-child(even) { background-color: #ffffff; }
  thead tr {  background-color: #4CAF50;  color: white; font-size:15px; }
  td { padding:5px; }
}

img{  box-shadow: 2px 2px 4px #555;}

#country_list_test {
  color:var(--black);
}


th:not(:empty) {
    cursor: pointer;
    user-select: none; /* Prevents text selection on double-click */
    position: relative;
    padding-right: 20px; /* Makes room for the arrow */
}

/* Base arrow styling using pseudo-element */
th:not(:empty)::after {
    content: ' ↕';
    position: absolute;
    right: 5px;
    color: #ccc; /* Faint color when unsorted */
    font-size: 0.8em;
}

/* Active sorting states */
th:not(:empty)[data-order="asc"]::after {
    content: ' ↑';
    color: #000; /* Darker color for active column */
}

th:not(:empty)[data-order="desc"]::after {
    content: ' ↓';
    color: #000;
}



</style>

<script>
const isDOMElement = (obj) => obj instanceof Element;

const isPlainObject = (val) => {
  return typeof val === 'object' && val !== null && !Array.isArray(val);
};

  

  var knockouts

  window.addEventListener('load', function() {
    load_country_data(COUNTRY)
    COUNTRY.setup_keys()

    add_regions(COUNTRY)
    add_groups(COUNTRY)
    add_rankings(COUNTRY)
    add_flags(COUNTRY)
    
    display_all_countries()
    
  })
  
  function display_all_countries()
  {
    const table = document.createElement("table")
    const tbody = table.createTBody()
    const thead = table.createTHead()
    const headerRow = thead.insertRow();
    function add_header(txt, columns){
      const th = document.createElement("th");
        th.textContent = txt;
        if (columns) th.setAttribute('colspan', columns);
        headerRow.appendChild(th);
    }
    add_header("")
    add_header("Country")
    add_header("# World Rank")
    
    add_header("Region")
    add_header("Group")
    
    var c = COUNTRY.get_list()
    c.forEach( country => {
      let id = country.id
      const row = tbody.insertRow();

      let cell = row.insertCell()
      cell.appendChild(COUNTRY.get_image(id))
      
      cell = row.insertCell()
      cell.textContent = COUNTRY.get_name(id)+" ("+id+")"

      cell = row.insertCell()
      cell.textContent = COUNTRY.get_rank(id)

      cell = row.insertCell()
      cell.textContent = COUNTRY.get_region(id)

      cell = row.insertCell()
      cell.textContent = COUNTRY.get_group(id)

    })
    document.getElementById('country_list_test').appendChild(table)
    
    
document.querySelectorAll('th').forEach(header => {
    header.addEventListener('click', () => {
        const table = header.closest('table');
        const tbody = table.querySelector('tbody');
        const rows = Array.from(tbody.rows);
        const index = Array.from(header.parentNode.children).indexOf(header);
        const isAscending = header.dataset.order !== 'asc';
        
        // Reset all other headers in this table
        table.querySelectorAll('th').forEach(th => {
            if (th !== header) th.removeAttribute('data-order');
        });

        // Custom sort logic
        rows.sort((rowA, rowB) => {
            const cellA = rowA.cells[index].innerText.trim();
            const cellB = rowB.cells[index].innerText.trim();

            const valA = isNaN(cellA) || cellA === '' ? cellA : parseFloat(cellA);
            const valB = isNaN(cellB) || cellB === '' ? cellB : parseFloat(cellB);

            if (typeof valA === 'number' && typeof valB === 'number') {
                return isAscending ? valA - valB : valB - valA;
            }
            return isAscending 
                ? valA.toString().localeCompare(valB.toString()) 
                : valB.toString().localeCompare(valA.toString());
        });

        // Re-append sorted rows and toggle order state
        rows.forEach(row => tbody.appendChild(row));
        header.dataset.order = isAscending ? 'asc' : 'desc';
    });
});
    
    
  }
  
  
 
</script>
