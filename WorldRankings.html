<!DOCTYPE html>
<html>
<head>
<script src='scripts/country.js'></script>
<script src='scripts/country_data.js'></script>
<script src='scripts/flags.js'></script>
<script src='scripts/regions.js'></script>
<script src='scripts/groups.js'></script>
<script src='scripts/rankings.js'></script>


<link rel="stylesheet" href="scripts/uc.css">

<style>

body {
  /* Modern & Accessible */
  font-family: "Inter", Roboto, "Helvetica Neue", Arial, sans-serif;
  line-height: 1.6; /* Important for document readability */
  color: #333; /* Slightly softer than pure black */
}

#country_list_test {
  img{  box-shadow: 2px 2px 4px #555;}
  table { border-collapse: collapse; margin: 10px; }
  tbody tr:nth-child(odd)  { background-color: #f2f2f2; }
  tbody tr:nth-child(even) { background-color: #ffffff; }
  thead tr {  background-color: #4CAF50;  color: white; font-size:15px; }
  td { padding:5px; }
}

img{  box-shadow: 2px 2px 4px #555;}

#country_list_test {
  color:var(--black);
}

</style>

<script>
const isDOMElement = (obj) => obj instanceof Element;

const isPlainObject = (val) => {
  return typeof val === 'object' && val !== null && !Array.isArray(val);
};

  

  var knockouts

  window.addEventListener('load', function() {
    load_country_data(COUNTRY)
    COUNTRY.setup_keys()

    add_regions(COUNTRY)
    add_groups(COUNTRY)
    add_rankings(COUNTRY)
    add_flags(COUNTRY)
    
    display_all_countries()
    
  })
  
  function display_all_countries()
  {
    const table = document.createElement("table")
    const tbody = table.createTBody()
    const thead = table.createTHead()
    const headerRow = thead.insertRow();
    function add_header(txt, columns){
      const th = document.createElement("th");
        th.textContent = txt;
        if (columns) th.setAttribute('colspan', columns);
        headerRow.appendChild(th);
    }
    add_header("Country", 2)
    add_header("# World Rank")
    
    add_header("Region")
    add_header("Group")
    
    var c = COUNTRY.get_list()
    c.forEach( country => {
      let id = country.id
      const row = tbody.insertRow();

      let cell = row.insertCell()
      cell.appendChild(COUNTRY.get_image(id))
      
      cell = row.insertCell()
      cell.textContent = COUNTRY.get_name(id)+" ("+id+")"

      cell = row.insertCell()
      cell.textContent = COUNTRY.get_rank(id)

      cell = row.insertCell()
      cell.textContent = COUNTRY.get_region(id)

      cell = row.insertCell()
      cell.textContent = COUNTRY.get_group(id)

    })
    document.getElementById('country_list_test').appendChild(table)
  }
  
  
 
</script> 



</head>
<body>
<div class=title>UC Master Yodas' World Cup Football 2026 Competition</div>
<div class=page>
<p><h2>Current FIFA Mens World Rankings (as of MAY 2026)</h2>

<div id='country_list_test'></div>
</div>


</body>
</html>
