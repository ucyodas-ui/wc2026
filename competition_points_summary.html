<html>
<head><script src='scripts/uc.js'></script>

<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="64x64" href="images/favicon-64x64.png">
<script src='scripts/country.js'></script>
<script src='scripts/country_data.js'></script>
<script src='scripts/flags.js'></script>
<script src='scripts/groups.js'></script>
<script src='scripts/rankings.js'></script>
<script src='scripts/matches.js'></script>
<script src='scripts/sortable_list.js'></script>
<script src='scripts/scores.js'></script>
<script src='scripts/points_table.js'></script>
<script src="scripts/entries.js"></script>
<script src="scripts/dummy_entries.js"></script>
<script src='scripts/group_stage.js'></script>
<script src='scripts/entry_points.js'></script>
<script src='scripts/draw.js'></script>
<script src='scripts/third_place.js'></script>

<link rel="stylesheet" href="scripts/sortable_list.css">
<link rel="stylesheet" href="scripts/uc.css">
<style>


img{  box-shadow: 2px 2px 4px #555;}

.flag{
  height:15px;
  padding=2px;
  margin-right:5px;
  margin-left:5px;
  border:1px solid #888;
  box-shadow:1px 1px 1px 2px RGBA(50,50,50,0.1);
}

#result {
  font-size:12px;
  img{  box-shadow: 2px 2px 4px #555;}
  table { border-collapse: collapse; margin: 10px; min-width:770px;}
  tbody tr:nth-child(odd)  { background-color: #f2f2f2; }
  tbody tr:nth-child(even) { background-color: #ffffff; }
  thead tr {  background-color: #4CAF50;  color: white; font-size:15px; }
  td { padding:5px; color:black; min-width:20px;}
  th { vertical-align:bottom;  background-color:#222; color:#eee; padding:2px; border:1px solid white; position:sticky; top: 65px;} 
}

</style>

<script>


  let RESULTS = new knockout_results()
  
  window.addEventListener('load', function() {
    console.log("LOAD")

    setup_entries()
    
    load_country_data(COUNTRY)
    COUNTRY.setup_keys()
    DRAW.add_country(COUNTRY)
    
    add_groups(COUNTRY)
    add_rankings(COUNTRY)
    add_flags(COUNTRY)
    const gs = new group_stage(COUNTRY)

    RESULTS.add_country(COUNTRY)
    RESULTS.add_third_place_ranking_table(THIRD_PLACE_RANKING_VS)
    add_matches(DRAW)
    RESULTS.add_draw(DRAW)
   
    add_scores(RESULTS)

    gs.grp_ids.forEach(group_id => {
      let ranked = gs.get_ranked_teams(group_id)
      RESULTS.add_group_results(group_id, ranked, true)
    })

    var third_ranks = gs.get_third_place_ranks()
    RESULTS.add_third_place_teams(third_ranks)

    
 
    DRAW.setup_bracket()
    
    knockouts = DRAW.get_bracket()

    console.log("knockouts", knockouts)
    

    const ep = new entry_points(entries, gs, RESULTS)

    // Display based on potential points
    const pts = ep.total_points()
    
//    console.log(pts)
    
  
    let html =[]
    html.push("<table>")
    html.push("<tr><th>Position<th>Entry<th>Confirmed Points<th>Potential Points")
  
    pts.forEach(entry => {
        html.push("<tr><td>"+entry.pos+(entry.tied?"**":"")+"<td>"+entry.entry.name+"<td>"+entry.total+"<td>("+entry.potential+")")
    })

    html.push("</table>")
    
    document.getElementById("result").innerHTML = html.join("")
    
    COUNTRY.update_class_flags()
  })
</script>  

</head>
<body><script>add_title("Competition Points Summary")</script>
<div class=page>
<div class=info></div>

<div id=result></div>


</div>
</body>
</html>
