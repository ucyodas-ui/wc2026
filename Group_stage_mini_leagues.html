<script>

function place(yes){ return yes ? "<span style='color:blue;' >&#10003;</span>" : ""; }
function qual( yes){ return yes ? "<span style='color:green;'>&#10004;</span>" : ""; }
function bonus(yes){ return yes ? "<span style='color:gold;' >&#9733;</span>"  : ""; }


function do_league_table(no, name, pts,gids)
{
  var html = []
  var n = name
  if (n == "donuts") n = n + " (A.K.A. the police football donation league)"

  html.push(`<p id='mini_${no}' class='mi'><p><h3 >Mini league #${no}: ${n}</h3>`)
  html.push("<p><table class=results><tr><th>#<th>Entry Name")
  gids.forEach(gid => html.push("<th>"+gid))
  
  html.push("<th>3rd bonus")
  html.push("<th>Total")
  
  let index = 0;
  pts.forEach(pt => {
//    console.log(pt)
    if(pt.entry.league.includes(name))
    {
      index++
      html.push(`<tr><td>${index}<td>${pt.entry.name}`)
      pt.groups.forEach(grp => html.push("<td>"+grp.potential))
      html.push(`<td>${pt.third_bonus.points}</span>`)
      html.push(`<td>${pt.total}</span>`)
    }
  });
  if (index==0) html.push("<tr><td colspan=4>No entries yet")
  
  html.push("</table>")
  return html.join("")
}

function do_top3_table(league_names,pts)
{
  let html = []
  html.push("<h2>Mini-league summary, at group stage</h2>")
  html.push("<table>")
  html.push("<tr><th>#<th>League Name<th colspan=2>1st place<th colspan=2>2nd place<th colspan=2>3rd place")

  Object.keys(league_names).forEach((name, index) => {
    html.push(`<tr><th>${index+1}<th><a href='#mini_${index+1}'>${name}</a>`)
    
    let count = 0;
    for(let i=0;i<pts.length;i++)
    {
      pt = pts[i]
//    console.log(pt)
      if(pt.entry.league.includes(name))
      {
        count++
        html.push(`<td>${pt.entry.name}<td>${pt.total}`)
        if(count>=3) break;
      }
    }
    while(count<3)
    {
      count++;
      html.push(`<td>---<td>---`)
    }
  })
  
  
  
  html.push("</table>")
  
  
  return html.join("")
}

function do_mini_leagues(pts,gids)
{
  var result = []

  // Find leagues:
  
  var league_names = { Yodas:1, UCAFC:1, kids:1, donuts:1}
  entries.forEach(entry => {
    entry.league.forEach(name => {
      league_names[name]=1
    })
  });

  var result = []
  
  result.push(do_top3_table(league_names,pts))
  
  
  // Get a table for each one
  Object.keys(league_names).forEach((name, index) => {
    result.push(do_league_table(index+1, name, pts,gids))
  })
  
  document.getElementById("result").innerHTML = result.join("")
}
