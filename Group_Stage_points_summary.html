<head><script src='scripts/uc.js'></script>

<link rel="stylesheet" href="scripts/sortable_list.css">
<link rel="stylesheet" href="scripts/uc.css">
<style>


img{  box-shadow: 2px 2px 4px #555;}

.flag{
  height:15px;
  padding=2px;
  margin-right:5px;
  margin-left:5px;
  border:1px solid #888;
  box-shadow:1px 1px 1px 2px RGBA(50,50,50,0.1);
}

#result {
  font-size:12px;
  img{  box-shadow: 2px 2px 4px #555;}
  table { border-collapse: collapse; margin: 5px; min-width:770px;}
  tbody tr:nth-child(odd)  { background-color: #f2f2f2; }
  tbody tr:nth-child(even) { background-color: #ffffff; }
  thead tr {  background-color: #4CAF50;  color: white; font-size:15px; }
  td { padding:5px; color:black; min-width:20px;}
  th { vertical-align:bottom;  background-color:#222; color:#eee; padding:2px; border:1px solid white;} 
}

</style>

<script>

function place(yes){ return yes ? "<span style='color:blue;' >&#10003;</span>" : ""; }
function qual( yes){ return yes ? "<span style='color:green;'>&#10004;</span>" : ""; }
function bonus(yes){ return yes ? "<span style='color:gold;' >&#9733;</span>"  : ""; }


  window.addEventListener('load', function() {
    console.log("LOAD")
    load_country_data(COUNTRY)
    COUNTRY.setup_keys()

    add_groups(COUNTRY)
    add_rankings(COUNTRY)
    add_flags(COUNTRY)

    const gs = new group_stage(COUNTRY)
    
    const ep = new entry_points(entries, gs)
    
    // Display based on potential points
    const pts = ep.potential_points()
    
  
    let html =[]
    html.push("<table>")
    html.push("<tr style='position:sticky; top:0px'><th rowspan=2>Position<th rowspan=2>Entry")
    gs.grp_ids.forEach(group_id => {  html.push("<th colspan=4>Group "+group_id); })
    html.push("<th colspan=3>Third place Bonus<th colspan=2>Points")

    const order = ["1st","2nd","3rd","4th"]

    html.push("<tr style='position:sticky; top:17px'>")
    gs.grp_ids.forEach(group_id => {
      let ranked = gs.get_ranked_teams(group_id)
      ranked.forEach((team,index) => { html.push(`<th>${order[index]}<br><span class='flag_${team.abr}'><span><br>${team.abr}<br>&nbsp;${qual(gs.has_qualified(team.abr))}`)})
    })
    html.push("<th>picked<br>(&lt;=12)<th>qual<br>(&lt;=8)<th>Points<th>Potential<th>Confirmed")
    
    
  
    pts.forEach((entry, i) => {
//      if(i<5)
      {
        let total = 0  // keep track just to make sure it all adds up
        html.push("<tr><td>"+entry.pos+(entry.tied?"**":"")+"<td>"+entry.entry.name)
        entry.groups.forEach(gpts => {
//          console.log(entry.entry.name, gpts)
          let ranked = gs.get_ranked_teams(gpts.grp)
          ranked.forEach((team,index) => {
            const abr = team.abr
            const predicted = entry.entry.groups[gpts.grp].indexOf(abr)
//            console.log("team",index,team, predicted)
            html.push("<td>"+order[predicted])
            var h = bonus(index==0 && gpts.all) + place(gpts.position[abr]) + qual(gpts.qualify[abr])
            if (h == "") h="&nbsp;"
            total += (index==0 && gpts.all) ? 1:0
            total += gpts.position[abr] ? 1 : 0
            total += gpts.qualify[abr] ? 1 : 0
            html.push("<br>"+h)
          })
          
        })
        
      html.push(`<td>${entry.third_bonus.picked}`)
      html.push(`<td>${entry.third_bonus.qual}`)
      html.push(`<td>${entry.third_bonus.points}`)

        
        html.push(`<td>${entry.potential}<td>(${entry.total})`) // ${total})`)
      }
    })
    
    document.getElementById("result").innerHTML = html.join("")
    
    html.push("</table>")
    
    COUNTRY.update_class_flags()
  })
</script>  

</head>
<body><script>add_title("Group Stage Points Summary")</script>
<div class=page>
<div class=info></div>
The following table shows the potential points, based on the current group standings.  Until all games are completed, these points will not be confirmed.
<p>
<script>
document.write(place(true)+" = picked correct position  (+1pt). ");
document.write(qual( true)+" = picked team to qualify to knockouts (+1pt). ");
document.write(bonus(true)+" = picked all 4 teams in correct order (+1pt). ");
</script>
<p>


<div id=result></div>


</div>
</body>
</html>
